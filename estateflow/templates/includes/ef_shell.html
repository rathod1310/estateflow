{%- macro ef_shell(page_title, active_nav="dashboard") %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#267a5a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>{{ page_title }} · EstateFlow CRM</title>
  <link rel="manifest" href="/assets/estateflow/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/estateflow/css/estateflow.css"/>
</head>
<body>

  <!-- Top Bar -->
  <header class="ef-topbar">
    <div class="ef-topbar-inner">
      <a href="/estateflow" class="ef-logo">
        <div class="ef-logo-icon">EF</div>
        <span class="ef-logo-text">EstateFlow</span>
      </a>
      <div class="ef-topbar-actions">
        <a href="/estateflow/leads?search=1" class="ef-icon-btn" title="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </a>
        <a href="/estateflow/settings" class="ef-icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Page content -->
  <main class="ef-main">
    {{ caller() }}
  </main>

  <!-- Bottom Navigation -->
  <nav class="ef-bottom-nav">
    <a href="/estateflow" class="ef-nav-item {% if active_nav == 'dashboard' %}ef-nav-active{% endif %}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="{% if active_nav == 'dashboard' %}2.5{% else %}1.8{% endif %}"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="/estateflow/leads" class="ef-nav-item {% if active_nav == 'leads' %}ef-nav-active{% endif %}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="{% if active_nav == 'leads' %}2.5{% else %}1.8{% endif %}"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Leads</span>
    </a>
    <a href="/estateflow/properties" class="ef-nav-item {% if active_nav == 'properties' %}ef-nav-active{% endif %}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="{% if active_nav == 'properties' %}2.5{% else %}1.8{% endif %}"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Properties</span>
    </a>
    <a href="/estateflow/follow-ups" class="ef-nav-item {% if active_nav == 'followups' %}ef-nav-active{% endif %}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="{% if active_nav == 'followups' %}2.5{% else %}1.8{% endif %}"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Follow-ups</span>
    </a>
    <a href="/estateflow/attendance" class="ef-nav-item {% if active_nav == 'attendance' %}ef-nav-active{% endif %}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="{% if active_nav == 'attendance' %}2.5{% else %}1.8{% endif %}"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
      <span>Attendance</span>
    </a>
  </nav>

  <!-- Toast container -->
  <div id="ef-toast-container"></div>

  <!-- Frappe JS is included by Frappe's portal framework automatically -->
  <script src="/assets/estateflow/js/estateflow.js"></script>
</body>
</html>
{%- endmacro %}
